<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08090d"/>
      <stop offset="100%" stop-color="#13151f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6c63ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow orbs -->
  <ellipse cx="150" cy="180" rx="320" ry="320" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="1050" cy="480" rx="260" ry="260" fill="url(#glow2)" filter="url(#blur2)"/>

  <!-- Border frame -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="rgba(108,99,255,0.25)" stroke-width="2"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Badge -->
  <rect x="80" y="180" width="230" height="34" rx="17" fill="rgba(108,99,255,0.15)" stroke="rgba(108,99,255,0.35)" stroke-width="1"/>
  <text x="195" y="202" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle" letter-spacing="1.5">✦ WEB STUDIJA</text>

  <!-- Main logo / wordmark -->
  <text x="80" y="300" font-family="Arial Black, Arial, sans-serif" font-size="96" font-weight="900" fill="#e8eaf0" letter-spacing="-3">studija</text>
  <text x="632" y="300" font-family="Arial Black, Arial, sans-serif" font-size="96" font-weight="900" fill="url(#accent)">.</text>

  <!-- Tagline -->
  <text x="80" y="358" font-family="Arial, sans-serif" font-size="26" font-weight="400" fill="#7a7f9a">Profesionālas mājas lapas Latvijas uzņēmumiem</text>

  <!-- Divider -->
  <rect x="80" y="388" width="60" height="3" rx="2" fill="url(#accent)"/>

  <!-- Price pill -->
  <rect x="80" y="415" width="195" height="48" rx="24" fill="#6c63ff"/>
  <text x="177" y="445" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">No €39 / mēnesī</text>

  <!-- Feature pills -->
  <rect x="292" y="415" width="148" height="48" rx="24" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="366" y="445" font-family="Arial, sans-serif" font-size="18" fill="#e8eaf0" text-anchor="middle">⚡ Ātra izstrāde</text>

  <rect x="458" y="415" width="158" height="48" rx="24" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="537" y="445" font-family="Arial, sans-serif" font-size="18" fill="#e8eaf0" text-anchor="middle">📱 Mobilā versija</text>

  <rect x="634" y="415" width="152" height="48" rx="24" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="710" y="445" font-family="Arial, sans-serif" font-size="18" fill="#e8eaf0" text-anchor="middle">🔍 SEO iekļauts</text>

  <!-- Stats row -->
  <text x="80" y="535" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="900" fill="#e8eaf0">15+</text>
  <text x="80" y="562" font-family="Arial, sans-serif" font-size="14" fill="#7a7f9a">projekti</text>

  <rect x="175" y="515" width="1" height="55" fill="rgba(255,255,255,0.1)"/>

  <text x="198" y="535" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="900" fill="#e8eaf0">48h</text>
  <text x="198" y="562" font-family="Arial, sans-serif" font-size="14" fill="#7a7f9a">pirmais makets</text>

  <rect x="320" y="515" width="1" height="55" fill="rgba(255,255,255,0.1)"/>

  <text x="343" y="535" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="900" fill="#e8eaf0">100%</text>
  <text x="343" y="562" font-family="Arial, sans-serif" font-size="14" fill="#7a7f9a">Latvijas klienti</text>

  <!-- Right side — browser mockup -->
  <rect x="820" y="160" width="320" height="310" rx="12" fill="#0e1018" stroke="rgba(108,99,255,0.3)" stroke-width="1.5"/>
  <!-- browser bar -->
  <rect x="820" y="160" width="320" height="38" rx="12" fill="#13151f"/>
  <rect x="820" y="186" width="320" height="12" fill="#13151f"/>
  <circle cx="845" cy="179" r="5" fill="#ff5f57"/>
  <circle cx="862" cy="179" r="5" fill="#febc2e"/>
  <circle cx="879" cy="179" r="5" fill="#28c840"/>
  <rect x="896" y="171" width="180" height="16" rx="8" fill="#08090d"/>
  <text x="986" y="183" font-family="Arial, sans-serif" font-size="9" fill="#4a4f6a" text-anchor="middle">jusuuznemums.lv</text>
  <!-- browser content lines -->
  <rect x="840" y="218" width="200" height="22" rx="4" fill="rgba(108,99,255,0.35)"/>
  <rect x="840" y="250" width="260" height="10" rx="3" fill="rgba(255,255,255,0.07)"/>
  <rect x="840" y="268" width="220" height="10" rx="3" fill="rgba(255,255,255,0.07)"/>
  <rect x="840" y="286" width="100" height="28" rx="14" fill="#6c63ff"/>
  <!-- metrics -->
  <rect x="840" y="330" width="78" height="60" rx="8" fill="#08090d" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="879" y="358" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="900" fill="#28c840" text-anchor="middle">98</text>
  <text x="879" y="374" font-family="Arial, sans-serif" font-size="9" fill="#7a7f9a" text-anchor="middle">Ātrums</text>
  <rect x="928" y="330" width="78" height="60" rx="8" fill="#08090d" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="967" y="358" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="900" fill="#28c840" text-anchor="middle">100</text>
  <text x="967" y="374" font-family="Arial, sans-serif" font-size="9" fill="#7a7f9a" text-anchor="middle">SEO</text>
  <rect x="1016" y="330" width="78" height="60" rx="8" fill="#08090d" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="1055" y="358" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="900" fill="#28c840" text-anchor="middle">94</text>
  <text x="1055" y="374" font-family="Arial, sans-serif" font-size="9" fill="#7a7f9a" text-anchor="middle">Mobilā</text>

  <!-- Bottom domain -->
  <text x="1120" y="600" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.2)" text-anchor="end">web-studija.vercel.app</text>
</svg>
